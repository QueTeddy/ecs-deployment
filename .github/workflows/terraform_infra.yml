name: Terraform Infrastructure

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: "The environment to deploy to"
      aws_region:
        required: false
        type: string
        description: "The AWS region to deploy to"
      component_name:
        required: true
        type: string
      project_name:
        required: true
        type: string
      current_working_directory:
        required: true
        type: string
      is_pull_request:
        required: false
        type: boolean
        default: false
        description: "When true, only validate and plan — skip apply"

  workflow_dispatch:
permissions:
  contents: read
  id-token: write

jobs:
  

  deploy_terraform_infrastructure:
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: ${{ inputs.environment }}
      AWS_REGION: ${{ inputs.aws_region }}
      COMPONENT_NAME: ${{ inputs.component_name }}
      PROJECT_NAME: ${{ inputs.project_name }}
      CWD: ${{ inputs.current_working_directory }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: "Configure AWS Credentials"
        uses: aws-actions/configure-aws-credentials@v4.0.2
        with:
          audience: sts.amazonaws.com
          role-to-assume: ${{ secrets.ASSUME_ROLE }} # The role to assume (The ARN of the created role)
          role-session-name: "GithubActions-${{ vars.PROJECT_NAME }}"
          aws-region: ${{ vars.REGION }}
          mask-aws-account-id: true # Hide Your AWS Account in workflow outputs
      
      - name: Make cloudformation script executable
        working-directory: ${{ env.CWD }}
        run: chmod +x ./scripts/cf_deploy.sh

      - name: Run Cloudformation for Terraform Infrastructure
        working-directory: ${{ env.CWD }}
        run: ./scripts/cf_deploy.sh ${{ vars.ENVIRONMENT }} ${{ vars.REGION }} ${{ vars.PROJECT_NAME }}
      
  terraform_plan_and_apply:
    needs: [deploy_terraform_infrastructure]
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: ${{ inputs.environment }}
      AWS_REGION: ${{ inputs.aws_region }}
      COMPONENT_NAME: ${{ inputs.component_name }}
      PROJECT_NAME: ${{ inputs.project_name }}
      CWD: ${{ inputs.current_working_directory }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.2
          terraform_wrapper: false

      - name: "Configure AWS Credentials"
        uses: aws-actions/configure-aws-credentials@v4.0.2
        with:
          audience: sts.amazonaws.com
          role-to-assume: ${{ secrets.ASSUME_ROLE }}
          role-session-name: "GithubActions-${{ vars.PROJECT_NAME }}"
          aws-region: ${{ vars.REGION }}
          mask-aws-account-id: true # Hide Your AWS Account in workflow outputs

      - name: Make backend script executable
        working-directory: ${{ env.CWD }}
        run: chmod +x ./scripts/backend.sh

      - name: Terraform Init
        working-directory: ${{ env.CWD }}
        run: ./scripts/backend.sh ${{ vars.ENVIRONMENT }} ${{ vars.REGION }} ${{ vars.PROJECT_NAME }}

      - name: Debug Backend Info
        working-directory: ${{ env.CWD }}
        run: cat .terraform/terraform.tfstate

      - name: Terraform Validate Resources
        working-directory: ${{ env.CWD }}
        run: terraform validate

      - name: Terraform Plan Infrastructure
        working-directory: ${{ env.CWD }}
        run: |
          aws s3 cp s3://${{ vars.ENVIRONMENT }}-${{ vars.PROJECT_NAME }}-secrets-bucket/${{ vars.ENVIRONMENT }}.auto.tfvars /tmp/${{ vars.ENVIRONMENT }}.auto.tfvars
          terraform plan -var-file="/tmp/${{ vars.ENVIRONMENT }}.auto.tfvars" -var REGION=${{ vars.REGION }} -out=tfplan-infra

      - name: Terraform Apply
        if: inputs.is_pull_request == false
        working-directory: ${{ env.CWD }}
        run: terraform apply -auto-approve tfplan-infra
